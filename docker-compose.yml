services:

  frontend:
    build:
      context: ./frontend

    ports:
      - "3000:3000"

    env_file:
      - .env

    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

    environment:
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"

    command: npm run dev

    depends_on:
      - backend


  backend:
    build:
      context: ./backend

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./backend:/app


volumes:
  frontend_node_modules: